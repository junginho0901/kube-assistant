apiVersion: v1
kind: Pod
metadata:
  name: exec-test-pod
  namespace: default
  labels:
    app: exec-test
spec:
  containers:
    - name: main-app
      image: busybox:latest
      command: ["sh", "-c", "echo 'main container running' && sleep 3600"]
    - name: sidecar
      image: alpine:latest
      command: ["sh", "-c", "echo 'sidecar running' && sleep 3600"]
