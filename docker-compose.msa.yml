services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-kagent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-kagent}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - msa-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kagent"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis (캐싱 및 세션 관리)
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - msa-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # AI Service
  ai-service:
    build:
      context: ./services/ai-service
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    env_file:
      - .env
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4}
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-kagent}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-kagent}
      - REDIS_URL=redis://redis:6379/0
      - K8S_SERVICE_URL=http://k8s-service:8002
      - SESSION_SERVICE_URL=http://session-service:8003
    networks:
      - msa-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # K8s Service
  k8s-service:
    build:
      context: ./services/k8s-service
      dockerfile: Dockerfile
    ports:
      - "8002:8002"
    env_file:
      - .env
    environment:
      - KUBECONFIG_PATH=/app/kubeconfig.yaml
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0
    volumes:
      - ./kubeconfig.yaml:/app/kubeconfig.yaml:ro
    dns:
      - 8.8.8.8
      - 8.8.4.4
    extra_hosts:
      - "${K8S_API_HOST:-pd-dev-305-cmp.k8s-api}:${K8S_API_IP}"
    networks:
      - msa-network
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # Session Service
  session-service:
    build:
      context: ./services/session-service
      dockerfile: Dockerfile
    ports:
      - "8003:8003"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-kagent}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-kagent}
    networks:
      - msa-network
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # API Gateway (NGINX)
  gateway:
    image: nginx:alpine
    ports:
      - "8000:8000"
    volumes:
      - ./services/gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - msa-network
    depends_on:
      - ai-service
      - k8s-service
      - session-service
      - frontend
    restart: unless-stopped

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8000
      - VITE_WS_URL=ws://localhost:8000
    networks:
      - msa-network
    restart: unless-stopped

networks:
  msa-network:
    driver: bridge

volumes:
  postgres_data:
