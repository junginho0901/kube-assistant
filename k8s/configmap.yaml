apiVersion: v1
kind: ConfigMap
metadata:
  name: kube-assistant-config
data:
  APP_NAME: "K8s DevOps Assistant"
  APP_VERSION: "1.0.0"
  DEBUG: "true"
  ALLOWED_ORIGINS: "http://localhost:3000,http://localhost:5173,http://localhost:8000"
  WS_HEARTBEAT_INTERVAL: "30"

  JWT_ISSUER: "kube-assistant-auth"
  JWT_AUDIENCE: "kube-assistant"
  JWT_EXPIRES_MINUTES: "10080"

  DEFAULT_ADMIN_EMAIL: "admin@local"
  KEY_DIR: "/app/.keys"

  POSTGRES_USER: "kagent"
  POSTGRES_DB: "kagent"

  REDIS_HOST: "redis"
  REDIS_PORT: "6379"
  REDIS_DB: "0"

  OPENAI_MODEL: "gpt-4-turbo-preview"
  OPENAI_BASE_URL: "https://api.openai.com/v1"
  OPENAI_OPTIMIZATION_MAX_TOKENS: "1800"

  IN_CLUSTER: "false"
  KUBECONFIG_PATH: "/app/kubeconfig.yaml"
  AUTH_JWKS_URL: "http://auth-service:8004/api/v1/auth/jwks.json"
  TOOL_SERVER_URL: "http://tool-server:8086"

  VITE_API_URL: "http://localhost:30080"
  VITE_WS_URL: "ws://localhost:30080"

  LITELLM_LOG: "INFO"
