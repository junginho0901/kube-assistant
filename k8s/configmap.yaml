apiVersion: v1
kind: ConfigMap
metadata:
  name: kube-assistant-config
data:
  APP_NAME: "K8s DevOps Assistant"
  APP_VERSION: "1.0.0"
  DEBUG: "true"
  ALLOWED_ORIGINS: "http://localhost:3000,http://localhost:5173,http://localhost:8000"
  WS_HEARTBEAT_INTERVAL: "30"

  JWT_ISSUER: "kube-assistant-auth"
  JWT_AUDIENCE: "kube-assistant"
  JWT_EXPIRES_MINUTES: "10080"

  DEFAULT_ADMIN_EMAIL: "admin@local"
  KEY_DIR: "/app/.keys"

  POSTGRES_USER: "kubest"
  POSTGRES_DB: "kubest"

  REDIS_HOST: "redis"
  REDIS_PORT: "6379"
  REDIS_DB: "0"

  OPENAI_MODEL: "gpt-4o-mini"
  OPENAI_BASE_URL: ""
  OPENAI_OPTIMIZATION_MAX_TOKENS: "1800"

  IN_CLUSTER: "true"
  KUBECONFIG_PATH: "/app/kubeconfig.yaml"
  SETUP_NAMESPACE: "kube-assistant"
  SETUP_KUBECONFIG_SECRET: "k8s-kubeconfig"
  SETUP_CONFIGMAP_NAME: "kube-assistant-config"
  SETUP_RESTART_DEPLOYMENTS: "k8s-service,tool-server"
  AUTH_JWKS_URL: "http://auth-service:8004/api/v1/auth/jwks.json"
  TOOL_SERVER_URL: "http://tool-server:8086"
  TOOL_SERVER_URL_READ: "http://tool-server:8086"
  TOOL_SERVER_URL_WRITE: "http://tool-server:8086"
  TOOL_SERVER_URL_ADMIN: "http://tool-server:8086"
  TOOL_SERVER_TOKEN_PASSTHROUGH: "true"
  TOOL_SERVER_USE_INCLUSTER: "false"

  VITE_API_URL: "http://localhost:30080"
  VITE_WS_URL: "ws://localhost:30080"
