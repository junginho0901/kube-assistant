apiVersion: v1
kind: ServiceAccount
metadata:
  name: model-config-controller-go
  namespace: kube-assistant
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: model-config-controller-go
  namespace: kube-assistant
rules:
  - apiGroups: ["ai.kube-assistant.io"]
    resources: ["modelconfigs", "modelconfigs/status"]
    verbs: ["get", "list", "watch", "patch", "update"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: model-config-controller-go
  namespace: kube-assistant
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: model-config-controller-go
subjects:
  - kind: ServiceAccount
    name: model-config-controller-go
    namespace: kube-assistant
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: model-config-controller-go
  namespace: kube-assistant
spec:
  replicas: 1
  selector:
    matchLabels:
      app: model-config-controller-go
  template:
    metadata:
      labels:
        app: model-config-controller-go
    spec:
      serviceAccountName: model-config-controller-go
      containers:
        - name: controller
          image: kube-assistant/model-config-controller-go:local
          imagePullPolicy: IfNotPresent
          env:
            - name: WATCH_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: MODEL_CONFIG_GROUP
              value: ai.kube-assistant.io
            - name: MODEL_CONFIG_VERSION
              value: v1alpha1
            - name: MODEL_CONFIG_PLURAL
              value: modelconfigs
          envFrom:
            - configMapRef:
                name: kube-assistant-config
            - secretRef:
                name: kube-assistant-secrets
