apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8s-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: k8s-service
  template:
    metadata:
      labels:
        app: k8s-service
    spec:
      serviceAccountName: k8s-service
      containers:
        - name: k8s-service
          image: kubeast/k8s-service:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8002
          readinessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 3
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 5
            periodSeconds: 30
            timeoutSeconds: 3
          envFrom:
            - configMapRef:
                name: kubeast-config
            - secretRef:
                name: kubeast-secrets
          volumeMounts:
            - name: kubeconfig
              mountPath: /app/kubeconfig.yaml
              subPath: kubeconfig.yaml
      volumes:
        - name: kubeconfig
          secret:
            secretName: k8s-kubeconfig
            optional: true
---
apiVersion: v1
kind: Service
metadata:
  name: k8s-service
spec:
  ports:
    - port: 8002
      targetPort: 8002
  selector:
    app: k8s-service
