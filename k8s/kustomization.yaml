apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: kube-assistant

resources:
  - namespace.yaml
  - model-config-crd.yaml
  - configmap.yaml
  - secret.yaml
  - rbac.yaml
  - postgres.yaml
  - redis.yaml
  - model-config-controller-go.yaml
  - auth-service.yaml
  - ai-service.yaml
  - k8s-service.yaml
  - tool-server.yaml
  - session-service.yaml
  - frontend.yaml
  - gateway.yaml

generatorOptions:
  disableNameSuffixHash: true

configMapGenerator:
  - name: gateway-nginx
    files:
      - nginx.conf=nginx.conf
