apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-service
  template:
    metadata:
      labels:
        app: ai-service
    spec:
      containers:
        - name: ai-service
          image: kubeast/ai-service:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8001
          envFrom:
            - configMapRef:
                name: kubeast-config
            - secretRef:
                name: kubeast-secrets
---
apiVersion: v1
kind: Service
metadata:
  name: ai-service
spec:
  ports:
    - port: 8001
      targetPort: 8001
  selector:
    app: ai-service
