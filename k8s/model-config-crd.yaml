apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: modelconfigs.ai.kube-assistant.io
spec:
  group: ai.kube-assistant.io
  scope: Namespaced
  names:
    kind: ModelConfig
    plural: modelconfigs
    singular: modelconfig
    shortNames:
      - mcfg
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required:
                - model
              properties:
                provider:
                  type: string
                model:
                  type: string
                baseURL:
                  type: string
                apiKeySecretRef:
                  type: object
                  properties:
                    name:
                      type: string
                    key:
                      type: string
                apiKeyEnv:
                  type: string
                extraHeaders:
                  type: object
                  additionalProperties:
                    type: string
                tlsVerify:
                  type: boolean
                enabled:
                  type: boolean
                isDefault:
                  type: boolean
            status:
              type: object
              properties:
                synced:
                  type: boolean
                dbId:
                  type: integer
                lastSyncTime:
                  type: string
                message:
                  type: string
