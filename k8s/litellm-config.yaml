## LiteLLM proxy config (OpenAI-compatible /v1/* API)
##
## This lets ai-service talk to multiple model providers through a single OpenAI-compatible endpoint.
## ai-service must be pointed at this gateway:
##   OPENAI_BASE_URL=http://litellm:4000/v1
## and OPENAI_MODEL should be one of the model_name values below.
##
## Provider API keys are read from environment variables (via `.env`).
## - OpenAI:     OPENAI_API_KEY
## - Anthropic:  ANTHROPIC_API_KEY
## - Gemini:     GEMINI_API_KEY
##
## Note: If you enable LiteLLM auth with LITELLM_MASTER_KEY, ai-service's OPENAI_API_KEY
## must match that master key (and you'll likely want to move provider keys to different env vars).

model_list:
  # OpenAI
  - model_name: gpt-4o-mini
    litellm_params:
      model: openai/gpt-4o-mini
      api_key: os.environ/OPENAI_API_KEY

  # Claude (Anthropic)
  - model_name: claude-3-5-sonnet
    litellm_params:
      model: anthropic/claude-3-5-sonnet-20241022
      api_key: os.environ/ANTHROPIC_API_KEY

  # Gemini
  - model_name: gemini-2.0-flash
    litellm_params:
      model: gemini/gemini-2.0-flash
      api_key: os.environ/GEMINI_API_KEY

general_settings:
  # Keep the OpenAI-compatible endpoints enabled.
  # (default is true; explicit here for clarity)
  openai_compatible_endpoints: true
