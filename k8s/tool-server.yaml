apiVersion: apps/v1
kind: Deployment
metadata:
  name: tool-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tool-server
  template:
    metadata:
      labels:
        app: tool-server
    spec:
      serviceAccountName: tool-server
      containers:
        - name: tool-server
          image: kube-assistant/tool-server:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8086
          envFrom:
            - configMapRef:
                name: kube-assistant-config
            - secretRef:
                name: kube-assistant-secrets
          env:
            - name: TOKEN_PASSTHROUGH
              valueFrom:
                configMapKeyRef:
                  name: kube-assistant-config
                  key: TOOL_SERVER_TOKEN_PASSTHROUGH
          volumeMounts:
            - name: kubeconfig
              mountPath: /app/kubeconfig.yaml
              subPath: kubeconfig.yaml
      volumes:
        - name: kubeconfig
          secret:
            secretName: k8s-kubeconfig
            optional: true
---
apiVersion: v1
kind: Service
metadata:
  name: tool-server
spec:
  ports:
    - port: 8086
      targetPort: 8086
  selector:
    app: tool-server
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: tool-server
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: tool-server
rules:
  - apiGroups: ["*"]
    resources: ["*"]
    verbs: ["*"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: tool-server
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: tool-server
subjects:
  - kind: ServiceAccount
    name: tool-server
    namespace: kube-assistant
