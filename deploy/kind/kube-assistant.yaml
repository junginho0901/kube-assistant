apiVersion: v1
kind: Namespace
metadata:
  name: kube-assistant
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: kube-assistant-config
  namespace: kube-assistant
data:
  POSTGRES_USER: kagent
  POSTGRES_DB: kagent
  JWT_ISSUER: kube-assistant-auth
  JWT_AUDIENCE: kube-assistant
  JWT_EXPIRES_MINUTES: "10080"
  DEFAULT_ADMIN_EMAIL: admin@local
  OPENAI_MODEL: gpt-4o-mini
  AUTH_JWKS_URL: http://auth-service:8004/api/v1/auth/jwks.json
  REDIS_URL: redis://redis:6379/0
  REDIS_HOST: redis
  REDIS_PORT: "6379"
  REDIS_DB: "0"
  K8S_SERVICE_URL: http://k8s-service:8002
  SESSION_SERVICE_URL: http://session-service:8003
  IN_CLUSTER: "false"
  KUBECONFIG_PATH: /app/kubeconfig
  ALLOWED_ORIGINS: http://localhost:5173,http://localhost:8000
  VITE_API_URL: http://localhost:8000
  VITE_WS_URL: ws://localhost:30080
  KEY_DIR: /app/.keys
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: gateway-config
  namespace: kube-assistant
data:
  nginx.conf: |
    events {
        worker_connections 1024;
    }
    
    http {
        upstream ai-service {
            server ai-service:8001;
        }
    
        upstream k8s-service {
            server k8s-service:8002;
        }
    
        upstream session-service {
            server session-service:8003;
        }
    
        upstream auth-service {
            server auth-service:8004;
        }
    
        upstream frontend {
            server frontend:5173;
        }
    
        server {
            listen 8000;
            server_name localhost;
    
            # 프론트엔드 라우팅
            location / {
                proxy_pass http://frontend;
                proxy_http_version 1.1;
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection 'upgrade';
                proxy_set_header Host $host;
                proxy_cache_bypass $http_upgrade;
            }
    
            # AI Service
            location /api/v1/ai {
                proxy_pass http://ai-service/api/v1/ai;
                proxy_http_version 1.1;
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection 'upgrade';
                proxy_set_header Host $host;
                proxy_cache_bypass $http_upgrade;
                
                # SSE(Server-Sent Events) 지원
                proxy_buffering off;
                proxy_read_timeout 300s;
                proxy_connect_timeout 75s;
            }
    
            # K8s Service - 모든 클러스터 관련 API
            location /api/v1/namespaces {
                proxy_pass http://k8s-service/api/v1/namespaces;
                proxy_http_version 1.1;
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection 'upgrade';
                proxy_set_header Host $host;
                proxy_cache_bypass $http_upgrade;
            }
    
            # Cluster Metrics - URL 재작성 (가장 구체적인 경로를 먼저)
            location ~ ^/api/v1/cluster/metrics/(.*)$ {
                rewrite ^/api/v1/cluster/metrics/(.*)$ /api/v1/metrics/$1 break;
                proxy_pass http://k8s-service;
                proxy_http_version 1.1;
                proxy_set_header Host $host;
            }
    
            # Cluster Overview - URL 재작성
            location /api/v1/cluster/overview {
                rewrite ^/api/v1/cluster/overview$ /api/v1/overview break;
                proxy_pass http://k8s-service;
                proxy_http_version 1.1;
                proxy_set_header Host $host;
            }
    
            # Cluster Nodes - URL 재작성
            location ~ ^/api/v1/cluster/nodes/(.+)/describe$ {
                rewrite ^/api/v1/cluster/nodes/(.+)/describe$ /api/v1/nodes/$1/describe break;
                proxy_pass http://k8s-service;
                proxy_http_version 1.1;
                proxy_set_header Host $host;
            }

            location ~ ^/api/v1/cluster/nodes/(.+)/debug-shell/ws$ {
                proxy_pass http://k8s-service;
                proxy_http_version 1.1;
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection 'upgrade';
                proxy_set_header Host $host;
                proxy_cache_bypass $http_upgrade;
            }
    
            location /api/v1/cluster/nodes {
                rewrite ^/api/v1/cluster/nodes$ /api/v1/nodes break;
                proxy_pass http://k8s-service;
                proxy_http_version 1.1;
                proxy_set_header Host $host;
            }
    
            # Cluster Namespaces - URL 재작성 (하위 경로 포함)
            location ~ ^/api/v1/cluster/namespaces/(.*)$ {
                rewrite ^/api/v1/cluster/namespaces/(.*)$ /api/v1/namespaces/$1 break;
                proxy_pass http://k8s-service;
                proxy_http_version 1.1;
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection 'upgrade';
                proxy_set_header Host $host;
                proxy_cache_bypass $http_upgrade;
            }
    
            location /api/v1/cluster {
                proxy_pass http://k8s-service/api/v1;
                proxy_http_version 1.1;
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection 'upgrade';
                proxy_set_header Host $host;
                proxy_cache_bypass $http_upgrade;
            }
    
            location /api/v1/nodes {
                proxy_pass http://k8s-service/api/v1/nodes;
                proxy_http_version 1.1;
                proxy_set_header Host $host;
            }
    
            location /api/v1/topology {
                proxy_pass http://k8s-service/api/v1/topology;
                proxy_http_version 1.1;
                proxy_set_header Host $host;
            }
    
            location /api/v1/ws {
                proxy_pass http://k8s-service/api/v1/ws;
                proxy_http_version 1.1;
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection "Upgrade";
                proxy_set_header Host $host;
                proxy_read_timeout 3600s;
                proxy_send_timeout 3600s;
            }
    
            # Session Service
            location /api/v1/sessions {
                proxy_pass http://session-service/api/v1/sessions;
                proxy_http_version 1.1;
                proxy_set_header Host $host;
            }
    
            # Auth (Auth Service)
            location /api/v1/auth {
                proxy_pass http://auth-service/api/v1/auth;
                proxy_http_version 1.1;
                proxy_set_header Host $host;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
            }
    
            # Health checks - K8s Service 헬스체크 프록시
            location /health {
                proxy_pass http://k8s-service/health;
                proxy_http_version 1.1;
                proxy_set_header Host $host;
            }
        }
    }
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: k8s-service
  namespace: kube-assistant
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: k8s-service-view
subjects:
  - kind: ServiceAccount
    name: k8s-service
    namespace: kube-assistant
roleRef:
  kind: ClusterRole
  name: view
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: k8s-service-discovery
subjects:
  - kind: ServiceAccount
    name: k8s-service
    namespace: kube-assistant
roleRef:
  kind: ClusterRole
  name: system:discovery
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: kube-assistant
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          ports:
            - containerPort: 5432
          envFrom:
            - configMapRef:
                name: kube-assistant-config
            - secretRef:
                name: kube-assistant-secrets
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: postgres-data
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: kube-assistant
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: kube-assistant
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: kube-assistant
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: kube-assistant
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: kube-assistant/auth-service:dev
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8004
          envFrom:
            - configMapRef:
                name: kube-assistant-config
            - secretRef:
                name: kube-assistant-secrets
          env:
            - name: DATABASE_URL
              value: postgresql+asyncpg://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@postgres:5432/$(POSTGRES_DB)
          volumeMounts:
            - name: auth-keys
              mountPath: /app/.keys
      volumes:
        - name: auth-keys
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: kube-assistant
spec:
  selector:
    app: auth-service
  ports:
    - port: 8004
      targetPort: 8004
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-service
  namespace: kube-assistant
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-service
  template:
    metadata:
      labels:
        app: ai-service
    spec:
      containers:
        - name: ai-service
          image: kube-assistant/ai-service:dev
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8001
          envFrom:
            - configMapRef:
                name: kube-assistant-config
            - secretRef:
                name: kube-assistant-secrets
          env:
            - name: DATABASE_URL
              value: postgresql+asyncpg://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@postgres:5432/$(POSTGRES_DB)
            - name: REDIS_URL
              value: redis://redis:6379/0
            - name: K8S_SERVICE_URL
              value: http://k8s-service:8002
            - name: SESSION_SERVICE_URL
              value: http://session-service:8003
---
apiVersion: v1
kind: Service
metadata:
  name: ai-service
  namespace: kube-assistant
spec:
  selector:
    app: ai-service
  ports:
    - port: 8001
      targetPort: 8001
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8s-service
  namespace: kube-assistant
spec:
  replicas: 1
  selector:
    matchLabels:
      app: k8s-service
  template:
    metadata:
      labels:
        app: k8s-service
    spec:
      serviceAccountName: k8s-service
      containers:
        - name: k8s-service
          image: kube-assistant/k8s-service:dev
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8002
          envFrom:
            - configMapRef:
                name: kube-assistant-config
            - secretRef:
                name: kube-assistant-secrets
          env:
            - name: IN_CLUSTER
              value: "false"
            - name: KUBECONFIG_PATH
              value: /app/kubeconfig
          volumeMounts:
            - name: kubeconfig
              mountPath: /app/kubeconfig
              subPath: kubeconfig
      volumes:
        - name: kubeconfig
          secret:
            secretName: kubeconfig-secret
---
apiVersion: v1
kind: Service
metadata:
  name: k8s-service
  namespace: kube-assistant
spec:
  selector:
    app: k8s-service
  ports:
    - port: 8002
      targetPort: 8002
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: session-service
  namespace: kube-assistant
spec:
  replicas: 1
  selector:
    matchLabels:
      app: session-service
  template:
    metadata:
      labels:
        app: session-service
    spec:
      containers:
        - name: session-service
          image: kube-assistant/session-service:dev
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8003
          envFrom:
            - configMapRef:
                name: kube-assistant-config
            - secretRef:
                name: kube-assistant-secrets
          env:
            - name: DATABASE_URL
              value: postgresql+asyncpg://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@postgres:5432/$(POSTGRES_DB)
---
apiVersion: v1
kind: Service
metadata:
  name: session-service
  namespace: kube-assistant
spec:
  selector:
    app: session-service
  ports:
    - port: 8003
      targetPort: 8003
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: kube-assistant
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: gateway
          image: nginx:alpine
          ports:
            - containerPort: 8000
          volumeMounts:
            - name: gateway-config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
      volumes:
        - name: gateway-config
          configMap:
            name: gateway-config
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: kube-assistant
spec:
  selector:
    app: gateway
  ports:
    - port: 8000
      targetPort: 8000
      nodePort: 30080
  type: NodePort
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: kube-assistant
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: kube-assistant/frontend:dev
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5173
          env:
            - name: VITE_API_URL
              valueFrom:
                configMapKeyRef:
                  name: kube-assistant-config
                  key: VITE_API_URL
            - name: VITE_WS_URL
              valueFrom:
                configMapKeyRef:
                  name: kube-assistant-config
                  key: VITE_WS_URL
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: kube-assistant
spec:
  selector:
    app: frontend
  ports:
    - port: 5173
      targetPort: 5173
